services:
  - type: web
    name: evergreen-love-erp
    env: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: evergreen-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
